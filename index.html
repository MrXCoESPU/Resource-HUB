<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Training Department Resource HUB</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        /* --- PALETTE COLORI COORDINATA AL LOGO --- */
        :root {
            --panel-bg: rgba(15, 15, 15, 0.75); /* Schede scure in trasparenza sul video */
            --accent: #d4af37;             /* Oro / Giallo del logo */
            --accent-hover: #b8921a;       /* Oro più scuro al passaggio del mouse */
            --text-main: #f8fafc;
            --text-muted: #d4d4d4;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Inter', sans-serif;
            color: var(--text-main);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #000; /* Sfondo di sicurezza se il video si carica a rilento */
            overflow-x: hidden;
        }

        /* --- CONTENITORE VIDEO DI SFONDO --- */
        .video-background {
            position: fixed;
            right: 0;
            bottom: 0;
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            z-index: -2;
            object-fit: cover; /* Taglia e adatta il video a qualsiasi schermo */
        }

        /* Pellicola scura per rendere i testi perfettamente leggibili sul video */
        .video-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.65); /* Aumenta lo 0.65 se vuoi lo sfondo più scuro */
            z-index: -1;
        }

        /* Barra delle Lingue */
        .lang-bar {
            width: 100%;
            max-width: 750px;
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-bottom: 20px;
            z-index: 10;
        }

        .lang-btn {
            font-size: 1.5rem;
            cursor: pointer;
            filter: grayscale(0.6);
            transition: 0.3s;
            border: 2px solid transparent;
            border-radius: 4px;
            padding: 2px;
        }

        .lang-btn:hover, .lang-btn.active {
            filter: grayscale(0);
            transform: scale(1.15);
            border-color: var(--accent);
        }

        .hub-container { max-width: 750px; width: 100%; z-index: 5; }

        /* Header con Logo inserito */
        header { 
            text-align: center; 
            margin-bottom: 30px; 
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .logo-img {
            width: 150px;
            height: auto;
            margin-bottom: 15px;
            border-radius: 50%;
            box-shadow: 0 0 25px rgba(212, 175, 55, 0.3);
        }

        h1 { font-size: 1.8rem; font-weight: 700; letter-spacing: 0.5px; margin-bottom: 8px; text-shadow: 0 2px 4px rgba(0,0,0,0.8); }
        header p { color: var(--text-muted); font-size: 0.95rem; text-shadow: 0 1px 3px rgba(0,0,0,0.8); }
        
        /* QR Code */
        .qr-card {
            background: white;
            padding: 20px;
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
        }
        .qr-card p { color: #0a0a0a; font-weight: 700; margin-top: 12px; font-size: 0.8rem; text-align: center; letter-spacing: 0.5px;}

        /* Ricerca */
        .search-box {
            width: 100%;
            background: var(--panel-bg);
            border: 1px solid rgba(212, 175, 55, 0.3);
            padding: 14px 20px;
            border-radius: 12px;
            color: white;
            margin-bottom: 20px;
            outline: none;
            font-family: inherit;
            backdrop-filter: blur(5px);
            transition: 0.3s;
        }
        .search-box:focus {
            border-color: var(--accent);
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.3);
        }

        /* Liste e Categorie */
        .category-title {
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--accent);
            margin: 25px 0 12px 5px;
            letter-spacing: 1px;
            text-shadow: 0 1px 2px rgba(0,0,0,0.8);
        }

        .resource-item {
            background: var(--panel-bg);
            padding: 18px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            text-decoration: none;
            color: inherit;
            margin-bottom: 10px;
            backdrop-filter: blur(10px); /* Effetto vetro sfocato sul video */
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.2s ease;
        }

        .resource-item:hover {
            transform: translateY(-2px);
            border-color: rgba(212, 175, 55, 0.5);
            background: rgba(25, 25, 25, 0.85);
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
        }

        .file-info { display: flex; align-items: center; gap: 15px; }
        .file-icon { font-size: 1.5rem; }
        .file-name { font-weight: 600; display: block; margin-bottom: 2px; }
        .file-meta { font-size: 0.85rem; color: #cbd5e1; }

        .btn-download {
            background: var(--accent);
            color: #0a0a0a;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: 700;
            transition: 0.2s;
        }
        .resource-item:hover .btn-download {
            background: var(--accent-hover);
        }

        @media print { .lang-bar, .search-box, .category-title, .resource-item, .video-background, .video-overlay { display: none; } }
    </style>
</head>
<body>

    <video autoplay loop muted playsinline class="video-background">
        <source src="sfondo.mp4" type="video/mp4">
    </video>
    <div class="video-overlay"></div>

    <div class="lang-bar">
        <span class="lang-btn active" onclick="setLanguage('it')" title="Italiano">🇮🇹</span>
        <span class="lang-btn" onclick="setLanguage('en')" title="English">🇬🇧</span>
        <span class="lang-btn" onclick="setLanguage('fr')" title="Français">🇫🇷</span>
    </div>

    <div class="hub-container">
        <header>
            <img src="logo.jpeg" alt="Training Department Logo" class="logo-img">
            <h1 id="mainTitle">Training Department Resource HUB</h1>
            <p id="subTitle">Materiali e Risorse Digitali</p>
        </header>

        <div class="qr-card">
            <div id="qrcode"></div>
            <p id="qrText">SCANSIONA PER ACCEDERE AI FILE DAL TUO DISPOSITIVO</p>
        </div>

        <input type="text" id="searchInput" class="search-box" placeholder="Cerca..." onkeyup="filterFiles()">

        <div id="cat1" class="category-title">Documenti Tecnici</div>
        <div class="resource-list">
            
            <a href="TUO_LINK_1" class="resource-item" target="_blank">
                <div class="file-info">
                    <span class="file-icon">📄</span>
                    <div>
                        <span class="file-name">Manuale Operativo v1.2</span>
                        <span class="file-meta">PDF (3.5 MB)</span>
                    </div>
                </div>
                <div class="btn-download dl-text">SCARICA</div>
            </a>
            
            <a href="TUO_LINK_2" class="resource-item" target="_blank">
                <div class="file-info">
                    <span class="file-icon">🖼️</span>
                    <div>
                        <span class="file-name">Schema Circuitale</span>
                        <span class="file-meta">PNG (HD)</span>
                    </div>
                </div>
                <div class="btn-download dl-text">SCARICA</div>
            </a>

        </div>
    </div>

<script>
    const translations = {
        it: {
            subTitle: "Materiali e Risorse Digitali",
            qrText: "SCANSIONA PER ACCEDERE AI FILE DAL TUO DISPOSITIVO",
            searchPlaceholder: "Cerca tra le risorse...",
            cat1: "Documenti e Slide",
            dlText: "SCARICA"
        },
        en: {
            subTitle: "Digital Materials & Resources",
            qrText: "SCAN TO ACCESS FILES FROM YOUR DEVICE",
            searchPlaceholder: "Search resources...",
            cat1: "Documents & Slides",
            dlText: "DOWNLOAD"
        },
        fr: {
            subTitle: "Matériels et Ressources Numériques",
            qrText: "SCANNEZ POUR ACCÉDER AUX FICHIERS SUR VOTRE APPAREIL",
            searchPlaceholder: "Rechercher des ressources...",
            cat1: "Documents et Diapositives",
            dlText: "TÉLÉCHARGER"
        }
    };

    function setLanguage(lang) {
        document.getElementById('subTitle').innerText = translations[lang].subTitle;
        document.getElementById('qrText').innerText = translations[lang].qrText;
        document.getElementById('searchInput').placeholder = translations[lang].searchPlaceholder;
        document.getElementById('cat1').innerText = translations[lang].cat1;
        
        document.querySelectorAll('.dl-text').forEach(el => {
            el.innerText = translations[lang].dlText;
        });

        document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
        event.currentTarget.classList.add('active');
    }

    window.onload = function() {
        new QRCode(document.getElementById("qrcode"), {
            text: window.location.href,
            width: 180,
            height: 180,
            colorDark : "#0a0a0a",
            colorLight : "#ffffff",
            correctLevel : QRCode.CorrectLevel.H
        });
    };

    function filterFiles() {
        let input = document.getElementById('searchInput').value.toLowerCase();
        document.querySelectorAll('.resource-item').forEach(item => {
            let name = item.querySelector('.file-name').innerText.toLowerCase();
            item.style.display = name.includes(input) ? "flex" : "none";
        });
    }
</script>
</body>
</html>
